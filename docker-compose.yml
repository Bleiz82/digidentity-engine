# DigIdentity Engine — Docker Compose
# Servizi: FastAPI backend, Celery worker, Redis


services:
  # ---- Redis (Message Broker + Cache) ----
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - digidentity_internal

  # ---- FastAPI Backend ----
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
      - ./execution:/app/execution
      - ./directives:/app/directives
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    networks:
      - root_default
      - digidentity_internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.digidentity-api.rule=Host(`api.digidentityagency.it`)"
      - "traefik.http.routers.digidentity-api.entrypoints=websecure"
      - "traefik.http.routers.digidentity-api.tls.certresolver=mytlschallenge"
      - "traefik.http.services.digidentity-api.loadbalancer.server.port=8000"
      - "traefik.docker.network=root_default"

  # ---- Celery Worker (Task Queue) ----
  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
      - ./execution:/app/execution
      - ./directives:/app/directives
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    networks:
      - digidentity_internal

volumes:
  redis_data:

networks:
  root_default:
    external: true
  digidentity_internal:
    driver: bridge
